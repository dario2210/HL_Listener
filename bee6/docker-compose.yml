version: "3.8"

services:
  bee6-bot:
    build:
      context: /home/darek/apps/infra/bee6
      dockerfile: Dockerfile
    image: bee6-bot:latest
    container_name: bee6_bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8071:8071"
    volumes:
      - /home/darek/apps/infra/bee6:/app
    environment:
      - TZ=Europe/Warsaw
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8071')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


